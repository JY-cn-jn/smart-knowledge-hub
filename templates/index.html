<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Smart Knowledge Hub</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Knowledge Hub</h1>
            <p>智能 Markdown 知识库系统</p>

            <nav class="top-nav">
                <a href="{{ url_for('dashboard') }}">Dashboard 统计页</a>
            </nav>
        </header>

        <section class="intro">
            <h2>项目目标</h2>
            <p>
                这个系统未来会支持自动收集文章、保存 Markdown、自动分类、
                搜索文章，并推荐相关文章。
            </p>
        </section>

        <section class="search-box">
            <h2>搜索知识库</h2>

            <form action="{{ url_for('search') }}" method="get">
                <input
                    type="text"
                    name="q"
                    placeholder="输入关键词，例如 Flask、Python、知识库"
                >
                <button type="submit">搜索</button>
            </form>
        </section>

        <section class="articles">
            <h2>文章列表</h2>

            {% for article in articles %}
                {% include "components/article_card.html" %}
            {% endfor %}
        </section>
    </div>
</body>
</html>
