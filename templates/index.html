<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Smart Knowledge Hub</title>

    <!-- 引入 CSS 文件 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Knowledge Hub</h1>
            <p>智能 Markdown 知识库系统</p>
        </header>

        <section class="intro">
            <h2>项目目标</h2>
            <p>
                这个系统未来会支持自动收集文章、保存 Markdown、自动分类、
                搜索文章，并推荐相关文章。
            </p>
        </section>

        <section class="articles">
            <h2>最近文章</h2>

            {% for article in articles %}
                <div class="article-card">
                    <h3>{{ article.title }}</h3>
                    <p>{{ article.summary }}</p>
                </div>
            {% endfor %}
        </section>
    </div>
</body>
</html>
