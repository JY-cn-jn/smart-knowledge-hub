<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Smart Knowledge Hub</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Knowledge Hub</h1>
            <p>智能 Markdown 知识库系统</p>
        </header>

        <section class="intro">
            <h2>项目目标</h2>
            <p>
                这个系统未来会支持自动收集文章、保存 Markdown、自动分类、
                搜索文章，并推荐相关文章。
            </p>
        </section>

        <section class="articles">
            <h2>文章列表</h2>

            {% for article in articles %}
                <div class="article-card">
                    <h3>
                        <a href="{{ url_for('article_detail', slug=article.slug) }}">
                            {{ article.title }}
                        </a>
                    </h3>

                    <p>{{ article.summary }}</p>

                    <div class="meta">
                        <span>分类：{{ article.category }}</span>
                        <span>日期：{{ article.created_at }}</span>
                    </div>

                    <div class="tags">
                        {% for tag in article.tags %}
                            <span class="tag">{{ tag }}</span>
                        {% endfor %}
                    </div>
                </div>
            {% endfor %}
        </section>
    </div>
</body>
</html>
